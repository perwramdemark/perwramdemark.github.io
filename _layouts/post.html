---
layout: default
---

<div class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <span class="post-date">{{ page.date | date_to_string }}</span>
  {{ content }}

  <ul class="share-buttons mt-6">
    <li>
      <a href="https://bsky.app/intent/compose?text={{ page.title | uri_escape }}%20{{ site.url }}{{ page.url }}" target="_blank">
        <i class="fa-brands fa-bluesky"></i>
      </a>
    </li>
    <li>
      <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ page.url }}" target="_blank">
        <i class="fa-brands fa-linkedin"></i>
      </a>
    </li>
    <li>
      <a href="https://twitter.com/intent/tweet?text={{ page.title | uri_escape }}&url={{ site.url }}{{ page.url }}" target="_blank">
        <i class="fa-brands fa-x-twitter"></i>
      </a>
    </li>
    <li>
      <a href="http://www.reddit.com/submit?url={{ site.url | uri_escape }}{{ page.url | uri_escape }}&title={{ page.title | uri_escape }}" target="_blank" title="Submit to Reddit">
        <i class="fa-brands fa-reddit-alien"></i>
      </a>
    </li>
    <li>
      <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}" target="_blank" title="Share on Facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
    </li>
  </ul>

</div>

<div class="related">
  <h2>Related Posts</h2>
  <ul class="related-posts">
    {% for post in site.related_posts limit:3 %}
      <li>
        <h3>
          <a href="{{ site.baseurl }}{{ post.url }}">
            {{ post.title }}
            <small>{{ post.date | date_to_string }}</small>
          </a>
        </h3>
      </li>
    {% endfor %}
  </ul>
</div>
